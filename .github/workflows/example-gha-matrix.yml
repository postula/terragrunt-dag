  fake-plan-layer-8:
    name: "Fake plan (layer 8) - ${{ matrix.name }}"
    needs: [plan-matrix, fake-plan-layer-7]
    if: ${{ always() && needs.fake-plan-layer-7.result != 'failure' && needs.fake-plan-layer-7.result != 'cancelled' && fromJSON(needs.plan-matrix.outputs.layer_8).include[0] != null }}
