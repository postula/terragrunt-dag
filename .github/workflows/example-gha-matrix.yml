  fake-plan-layer-9:
    name: "Fake plan (layer 9) - ${{ matrix.name }}"
    needs: [plan-matrix, fake-plan-layer-8]
    if: ${{ always() && needs.fake-plan-layer-8.result != 'failure' && needs.fake-plan-layer-8.result != 'cancelled' && fromJSON(needs.plan-matrix.outputs.layer_9).include[0] != null }}
