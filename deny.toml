# cargo-deny configuration
#
# The license allow-list reflects what is downstream-compatible with this
# crate's AGPL-3.0-or-later license. Permissive licenses (MIT/Apache/BSD/etc.)
# can flow into AGPL output; copyleft licenses are restricted to AGPL/GPL/LGPL
# v3 or compatible variants. GPL-2.0-only is intentionally excluded because it
# cannot be combined with AGPL-3.0.

[graph]
  all-features = true
  targets      = []

[licenses]
  version                  = 2
  confidence-threshold     = 0.93
  unused-allowed-license   = "allow"
  allow = [
    "0BSD",
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "ISC",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-or-later",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
  ]
  exceptions = []

[advisories]
  version  = 2
  db-path  = "~/.cargo/advisory-db"
  db-urls  = ["https://github.com/rustsec/advisory-db"]
  yanked   = "warn"
  ignore   = []

[bans]
  multiple-versions = "warn"
  wildcards         = "deny"
  deny              = []
  skip              = []
  skip-tree         = []

[sources]
  unknown-registry = "deny"
  unknown-git      = "deny"
  allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
  allow-git        = []
